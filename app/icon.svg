<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="90FM Trivia">
  <style>
    .ground { fill: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      .ground { fill: #f0e7d8; }
    }
  </style>

  <!-- Capsule body of a vintage broadcast microphone -->
  <rect x="9.5" y="3" width="13" height="19" rx="6.5" fill="#8b1e2d" />

  <!-- Yoke pivots on either side of the capsule -->
  <circle class="ground" cx="9.5" cy="12.5" r="1" />
  <circle class="ground" cx="22.5" cy="12.5" r="1" />

  <!-- Horizontal grille slats, cream for contrast -->
  <g stroke="#f5efe6" stroke-width="1.25" stroke-linecap="round">
    <line x1="12.25" y1="7" x2="19.75" y2="7" />
    <line x1="12.25" y1="10" x2="19.75" y2="10" />
    <line x1="12.25" y1="13" x2="19.75" y2="13" />
    <line x1="12.25" y1="16" x2="19.75" y2="16" />
  </g>

  <!-- Amber pilot light near the base of the capsule -->
  <circle cx="16" cy="19" r="1.1" fill="#e0a458" />

  <!-- Stem -->
  <rect class="ground" x="15.25" y="22" width="1.5" height="5" />

  <!-- Desk stand -->
  <rect class="ground" x="10" y="27" width="12" height="2" rx="1" />
</svg>
